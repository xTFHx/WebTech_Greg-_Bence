<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git App - Repository kereső</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Repository keresés</h1>

    <input type="text" id="repo-search-input" placeholder="Repository elnevezése">
    <button class="btn btn-primary" id="search-btn">Keresés</button>

    <div id="result"></div>

    <script src="app.js"></script>
    <script>
        async function loadRepositories(searchText) {
            try {
                const res = await fetch('https://api.github.com/search/repositories?q='
                    + encodeURIComponent(searchText), {
                        headers: {
                            'Authorization': 'Bearer ' + GH_ACCESS_TOKEN
                        }
                    });
                if (!res.ok) {
                    throw Error('Hibás válasz, státuszkód:' + res.status);
                }

                const data = await res.json();

                const resultDiv = document.querySelector('#result');
                resultDiv.innerHTML = '';

                for (const repo of data.items) {
                    const repoHtml = `
                        <div class="card">
                            <a href="repo.html?name=${encodeURIComponent(repo.full_name)}">
                                ${repo.full_name}
                            </a>
                            <p>${repo.description}</p>
                            <p>Language: ${repo.language}</p>
                        </div>
                    `;
                    resultDiv.innerHTML += repoHtml;
                }
            } catch (err) {
                console.error(err);
                alert('Hiba történt a keresés során.');
            }
        }

        const searchBtn = document.querySelector('#search-btn');
        searchBtn.addEventListener('click', () => {
            const inputElem = document.querySelector('#repo-search-input');
            const searchText = inputElem.value;

            loadRepositories(searchText);
        });
    </script>
</body>
</html>
